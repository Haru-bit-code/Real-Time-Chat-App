<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Chat</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ── Join screen ── */
    #join-screen {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    #join-screen h1 {
      font-size: 28px;
      color: white;
      margin-bottom: 8px;
    }

    #join-screen p {
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      margin-bottom: 28px;
    }

    #join-screen input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: white;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      margin-bottom: 12px;
      text-align: center;
    }

    #join-screen input::placeholder { color: rgba(255,255,255,0.3); }
    #join-screen input:focus { border-color: #a78bfa; }

    #join-screen button {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity .2s;
    }

    #join-screen button:hover { opacity: 0.88; }

    /* ── Chat screen ── */
    #chat-screen {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 680px;
      height: 90vh;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      overflow: hidden;
    }

    .chat-header {
      padding: 18px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .online-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .chat-header h2 {
      color: white;
      font-size: 16px;
      font-weight: 600;
    }

    #user-count {
      margin-left: auto;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
    }

    .notification {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      padding: 4px 0;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 70%;
    }

    .message.mine {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.theirs {
      align-self: flex-start;
      align-items: flex-start;
    }

    .msg-name {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
      padding: 0 4px;
    }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      max-width: 100%;
      word-break: break-word;
    }

    .message.mine .msg-bubble {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.theirs .msg-bubble {
      background: rgba(255,255,255,0.1);
      color: white;
      border-bottom-left-radius: 4px;
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      gap: 10px;
    }

    .input-bar input {
      flex: 1;
      padding: 12px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: white;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border .2s;
    }

    .input-bar input::placeholder { color: rgba(255,255,255,0.3); }
    .input-bar input:focus { border-color: #a78bfa; }

    .input-bar button {
      padding: 12px 20px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity .2s;
    }

    .input-bar button:hover { opacity: 0.88; }
  </style>
</head>
<body>

  <!-- Join Screen -->
  <div id="join-screen">
    <h1>💬 Live Chat</h1>
    <p>Real-time chat — no account needed</p>
    <input id="username-input" type="text" placeholder="Enter your name" maxlength="20"/>
    <button onclick="joinChat()">Join Chat →</button>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen">
    <div class="chat-header">
      <div class="online-dot"></div>
      <h2>Live Chat Room</h2>
      <span id="user-count">Connecting...</span>
    </div>

    <div id="messages"></div>

    <div class="input-bar">
      <input id="msg-input" type="text" placeholder="Type a message..." maxlength="300"
             onkeydown="if(event.key==='Enter') sendMessage()"/>
      <button onclick="sendMessage()">Send ↗</button>
    </div>
  </div>

  <script>
    const socket = io();
    let username = "";
    let myColor  = "";

    // Random color for each user's name
    const colors = ["#a78bfa","#60a5fa","#34d399","#f472b6","#fb923c","#facc15"];

    function joinChat() {
      const val = document.getElementById("username-input").value.trim();
      if (!val) return alert("Please enter your name");

      username = val;
      myColor  = colors[Math.floor(Math.random() * colors.length)];

      document.getElementById("join-screen").style.display = "none";
      document.getElementById("chat-screen").style.display = "flex";

      socket.emit("user_joined", { username });
      document.getElementById("msg-input").focus();
    }

    function sendMessage() {
      const input = document.getElementById("msg-input");
      const text  = input.value.trim();
      if (!text) return;

      socket.emit("send_message", { username, text, color: myColor });
      input.value = "";
    }

    // Receive a message
    socket.on("message", (data) => {
      const msgs    = document.getElementById("messages");
      const isMe    = data.username === username;
      const div     = document.createElement("div");
      div.className = `message ${isMe ? "mine" : "theirs"}`;

      div.innerHTML = `
        <div class="msg-name" style="color: ${data.color}">${isMe ? "You" : data.username}</div>
        <div class="msg-bubble">${escapeHtml(data.text)}</div>
      `;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    });

    // Join/leave notifications
    socket.on("notification", (data) => {
      const msgs = document.getElementById("messages");
      const div  = document.createElement("div");
      div.className   = "notification";
      div.textContent = data.text;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    });

    // Safety: prevent XSS attacks
    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }
  </script>
</body>
</html>
